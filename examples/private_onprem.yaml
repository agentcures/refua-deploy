name: refua-internal-lab
cloud:
  visibility: private
  provider: onprem
  region: dc1
openclaw:
  base_url: https://openclaw.internal.example.org
  model: openclaw:main
  timeout_seconds: 180
runtime:
  namespace: refua-lab
  orchestrator: compose
  campaign:
    image: ghcr.io/agentcures/ClawCures:latest
    objective: Run an internal validation campaign for infectious disease targets
    schedule: 0 */12 * * *
    max_rounds: 3
    max_calls: 10
    output_path: /var/lib/refua/output/latest_run.json
  mcp:
    image: ghcr.io/agentcures/refua-mcp:latest
    replicas: 1
    port: 8000
    transport: streamable-http
kubernetes:
  distribution: k3s
  ingress_class: nginx
  service_type: ClusterIP
  storage_class: local-path
  create_network_policy: false
  namespace_annotations: {}
gpu:
  mode: auto
  vendor: nvidia
  count: 1
  resource_name: nvidia.com/gpu
  mcp_enabled: true
  campaign_enabled: false
  node_selector: {}
  toleration_key: nvidia.com/gpu
automation:
  auto_discover_network: true
  bootstrap_cluster: true
  provisioning_level: auto
  cluster_name: null
  kubernetes_version: "1.30"
  node_count: 3
  node_instance_type: null
  node_disk_gb: 100
security:
  mcp_auth_secret_name: refua-mcp-auth-token
  mcp_auth_secret_key: REFUA_MCP_AUTH_TOKENS
  create_placeholder_secrets: true
network:
  expose_mcp: true
  ingress_host: null
  allowed_hosts: []
  allowed_origins: []
storage:
  output_volume_size: 20Gi
